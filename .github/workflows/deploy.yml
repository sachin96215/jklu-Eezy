name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        # base-href must match: https://<username>.github.io/<repo-name>/
        run: flutter build web --release --base-href "/jklu-Eezy/"

      - name: Copy web build to docs folder
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r build/web/* docs/

      - name: Commit and push docs folder
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/
          git commit -m "Deploy: Update Flutter web build" || echo "No changes to commit"
          git push origin main
